services:

  db:
    image: postgres:16-alpine
    container_name: tp-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: travelplanner
      POSTGRES_PASSWORD: travelplanner
      POSTGRES_DB: travelplanner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelplanner -d travelplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: tp-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://travelplanner:travelplanner@db:5432/travelplanner
      OLLAMA_URL: http://ollama:11434
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  ollama:
    image: ollama/ollama:latest
    container_name: tp-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    entrypoint: >
      sh -c "ollama serve &
             sleep 3 &&
             ollama pull qwen3:1.7b &&
             wait"

volumes:
  pgdata:
  ollama_data:
