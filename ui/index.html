<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chatbot de Viajes</title>
    <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>

<div class="chat-container">

    <div class="header">
        <h2>Asistente de Viajes</h2>
        <button id="end-session" class="end-btn">Finalizar sesión</button>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Escribe tu mensaje...">
        <button id="send-btn" class="send-btn">Enviar</button>
    </div>

</div>

<script src="/ui/chat.js"></script>
</body>
</html>
